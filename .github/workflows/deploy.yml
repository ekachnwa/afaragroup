- name: Deploy Next.js to Namecheap
  uses: Dylan700/sftp-upload-action@latest
  with:
    server: ${{ secrets.HOST }}
    username: ${{ secrets.USERNAME }}
    password: ${{ secrets.PASSWORD }}
    port: ${{ secrets.PORT }}
    uploads: |
      ./app => /home/fixdtekw/afaragroup.com.ng/app
      ./.next => /home/fixdtekw/afaragroup.com.ng/.next
      ./components => /home/fixdtekw/afaragroup.com.ng/components
      ./public => /home/fixdtekw/afaragroup.com.ng/public
      ./lib => /home/fixdtekw/afaragroup.com.ng/lib
      ./package.json => /home/fixdtekw/afaragroup.com.ng/package.json
      ./package-lock.json => /home/fixdtekw/afaragroup.com.ng/package-lock.json
      ./next.config.js => /home/fixdtekw/afaragroup.com.ng/next.config.js
      ./postcss.config.js => /home/fixdtekw/afaragroup.com.ng/postcss.config.js
      ./tailwind.config.js => /home/fixdtekw/afaragroup.com.ng/tailwind.config.js
      ./tsconfig.json => /home/fixdtekw/afaragroup.com.ng/tsconfig.json
    exclude: |
      node_modules
      .git
      .github
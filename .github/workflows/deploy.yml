name: Deploy Next.js to Namecheap

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install

      - name: Build Next.js App
        run: npm run build

      - name: Create Deployment Archive
        run: |
          zip -r deploy.zip . \
          -x "node_modules/*" \
          -x ".git/*"

      - name: Upload via SFTP
        uses: Dylan700/sftp-upload-action@latest
        with:
          server: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}
          port: ${{ secrets.PORT }}
          uploads: |
            ./ => /home/fixdtekw/afaragroup.com.ng/
          exclude: |
            node_modules
            .next
            .git
            .github